services:
  db:
    image: mysql:5.7
    container_name: dvwa-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dvwa
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: dvwa
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - dvwa-network

  dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa-app
    depends_on:
      - db
    expose:
      - "80"
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: dvwa
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: dvwa
    networks:
      - dvwa-network

  nginx:
    image: nginx:latest
    container_name: dvwa-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dvwa
    networks:
      - dvwa-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: dvwa-phpmyadmin
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    networks:
      - dvwa-network

networks:
  dvwa-network:
    driver: bridge

volumes:
  mysql-data: