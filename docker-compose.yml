services:
  db:
    image: mysql:5.7
    container_name: dvwa-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dvwa
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: dvwa
    expose:
      - "3306"
    networks:
      - dvwa-network

  dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa-app
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: dvwa
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: dvwa
    expose:
      - "80"
    networks:
      - dvwa-network

  nginx:
    image: nginx:latest
    container_name: dvwa-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - dvwa
    networks:
      - dvwa-network

networks:
  dvwa-network:
    driver: bridge